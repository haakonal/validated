name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package distributions
        run: uv build

      - name: Create GitHub Release and upload assets
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release already exists."
            is_draft=$(gh release view "${{ github.ref_name }}" --json isDraft -q .isDraft)
            if [ "$is_draft" = "true" ]; then
              echo "Release is a draft. Uploading assets..."
              gh release upload "${{ github.ref_name }}" dist/* --clobber
            else
              echo "Error: Release is already published and immutable."
              echo "To trigger release artifact uploads automatically in an immutable repository:"
              echo "1. Push the tag via git CLI: git tag <version> && git push origin <version>"
              echo "2. Or save the release as a 'Draft' in the GitHub UI, which allows the pipeline to upload assets before publishing."
              exit 1
            fi
          else
            echo "Release does not exist. Creating draft release and uploading assets..."
            gh release create "${{ github.ref_name }}" dist/* \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --draft
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
